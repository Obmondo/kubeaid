argo-cd:
  global:
    revisionHistoryLimit: 2
  # to make this chart work with helm 3 - it does still install CRDs
  installCRDs: false
  # find latest tag here: https://github.com/argoproj/argo-helm/blob/master/charts/argo-cd/Chart.yaml (AppVersion)
  configs:
    cmp:
      create: true
      plugins:
        helmfile:
          allowConcurrency: true
          discover:
            fileName: helmfile.yaml
          generate:
            command:
              - bash
              - "-c"
              - |
                if [[ -v ENV_NAME ]]; then
                  helmfile -n "$ARGOCD_APP_NAMESPACE" -e $ENV_NAME template --include-crds -q
                elif [[ -v ARGOCD_ENV_ENV_NAME ]]; then
                  helmfile -n "$ARGOCD_APP_NAMESPACE" -e "$ARGOCD_ENV_ENV_NAME" template --include-crds -q
                else
                  helmfile -n "$ARGOCD_APP_NAMESPACE" template --include-crds -q
                fi
          lockRepo: false
  dex:
    enabled: false
    resources:
      limits:
        memory: 64Mi
      requests:
        cpu: 1m
        memory: 32Mi
  repoServer:
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 10m
        memory: 128Mi
    replicas: 1
    autoscaling:
      enabled: false
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    extraContainers:
      - name: helmfile
        image: ghcr.io/helmfile/helmfile:v1.1.0
        # Entrypoint should be Argo CD lightweight CMP server i.e. argocd-cmp-server
        command: ["/var/run/argocd/argocd-cmp-server"]
        env:
          - name: HELM_CACHE_HOME
            value: /tmp/helm/cache
          - name: HELM_CONFIG_HOME
            value: /tmp/helm/config
          - name: HELMFILE_CACHE_HOME
            value: /tmp/helmfile/cache
          - name: HELMFILE_TEMPDIR
            value: /tmp/helmfile/tmp
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
        volumeMounts:
          - mountPath: /var/run/argocd
            name: var-files
          - mountPath: /home/argocd/cmp-server/plugins
            name: plugins
          # Register helmfile plugin into sidecar
          - mountPath: /home/argocd/cmp-server/config/plugin.yaml
            subPath: helmfile.yaml
            name: argocd-cmp-cm
          # Starting with v2.4, do NOT mount the same tmp volume as the repo-server container. The filesystem separation helps mitigate path traversal attacks.
          - mountPath: /tmp
            name: helmfile-tmp
    volumes:
      - name: argocd-cmp-cm
        configMap:
          name: argocd-cmp-cm
      - name: helmfile-tmp
        emptyDir: {}
  server:
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 5m
        memory: 128Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    config:
      resource.exclusions: |
        - apiGroups:
          - "velero.io"
          kinds:
          - "Backup"
          clusters:
          - "*"
  controller:
    resources:
      limits:
        memory: 1024Mi
      requests:
        cpu: 250m
        memory: 512Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  redis:
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 2m
        memory: 64Mi
    metrics:
      enabled: true
      image:
        repository: bitnami/redis-exporter
      serviceMonitor:
        enabled: true
  notifications:
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 2m
        memory: 64Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

kubeaidAppProject:
  enabled: true

blackbox:
  probe: true
